name: Chorcha Quiz Battle Bot

on:
  # Allows manual run from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      battle_count:
        description: 'Number of battle rooms to create and solve'
        required: true
        default: '8'
        type: string


jobs:
  run-battle:
    runs-on: ubuntu-26.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright

      - name: Install Playwright Chromium & System Dependencies
        run: |
          python -m playwright install chromium --with-deps

      - name: Run Battle Bot
        env:
          COOKIE_JSON: ${{ secrets.COOKIE_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CHORCHA_PHONE: ${{ secrets.CHORCHA_PHONE }}
          CHORCHA_PASS: ${{ secrets.CHORCHA_PASS }}
        run: |
          # Use manual input for count, fallback to 5
          COUNT="${{ github.event.inputs.battle_count }}"
          if [ -z "$COUNT" ]; then
            COUNT="5"
          fi
          python -u battle_bot.py "$COUNT"